<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CF × Vation | Partnership Summary</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f3f0;
  --bg2: #ffffff;
  --bg3: #eceae6;
  --card: #ffffff;
  --card2: #f7f6f3;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --red: #ED193A;
  --red2: rgba(237,25,58,0.09);
  --red3: rgba(237,25,58,0.04);
  --text: #181715;
  --muted: #999693;
  --muted2: #5c5a57;
  --green: #15803d;
  --green2: rgba(21,128,61,0.09);
  --amber: #92400e;
  --amber2: rgba(146,64,14,0.09);
  --blue: #1e40af;
  --blue2: rgba(30,64,175,0.09);
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --sb: 220px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:15px; overflow-x:hidden; }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--red); }
#prog { position:fixed; top:0; left:0; height:2px; background:var(--red); z-index:300; transition:width .08s; }

/* ── SIDEBAR ── */
.sidebar {
  position:fixed; top:0; left:0; bottom:0; width:var(--sb);
  background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; z-index:200; overflow-y:auto;
}
.sb-logo {
  padding:1.25rem 1.25rem 1rem;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.sb-dot {
  width:28px; height:28px; border-radius:5px; background:var(--red);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:9px; font-weight:700; color:#fff; flex-shrink:0;
}
.sb-name { font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; line-height:1.3; }
.sb-sub { font-family:var(--mono); font-size:8.5px; color:var(--muted); margin-top:1px; }
.sb-sect {
  padding:.8rem 1rem .25rem;
  font-family:var(--mono); font-size:8.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted);
}
.sb-link {
  display:flex; align-items:center; gap:8px;
  padding:.42rem .7rem; margin:1px .3rem;
  border-radius:4px; font-size:12px; font-weight:500; color:var(--muted2);
  text-decoration:none; cursor:pointer; border:none; background:none;
  width:calc(100% - .6rem); text-align:left; transition:all .15s;
}
.sb-link:hover { background:var(--bg3); color:var(--text); }
.sb-link.active { background:var(--red2); color:var(--red); font-weight:600; }
.sb-pip { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.pip-g { background:var(--green); }
.pip-r { background:var(--red); }
.pip-a { background:var(--amber); }
.pip-b { background:var(--blue); }
.pip-m { background:var(--muted); }
.sb-footer {
  margin-top:auto; padding:.9rem 1.25rem;
  border-top:1px solid var(--border);
  font-family:var(--mono); font-size:8.5px; color:var(--muted); line-height:1.7;
}

/* ── MAIN ── */
.main { margin-left:var(--sb); min-height:100vh; }
.sec { padding:4.5rem 3.5rem; }
.sec-alt { background:var(--bg2); }
.sec-stripe { background:var(--bg3); }
.divider { height:1px; background:var(--border); }

/* ── TYPOGRAPHY ── */
.eyebrow {
  font-family:var(--mono); font-size:10px; letter-spacing:.13em; text-transform:uppercase;
  color:var(--red); display:flex; align-items:center; gap:6px; margin-bottom:.6rem;
}
.eyebrow::before { content:'//'; opacity:.4; }
h2 {
  font-size:clamp(1.8rem,3vw,2.6rem); font-weight:700; line-height:1.05;
  letter-spacing:-.02em; margin-bottom:.6rem; color:var(--text);
}
.section-lead {
  font-size:.93rem; color:var(--muted2); line-height:1.75;
  max-width:560px; margin-bottom:2.5rem; font-weight:400;
}

/* ── OVERVIEW TILE GRID ── */
#overview { padding:3.5rem 3.5rem 4rem; background:var(--bg2); }
.ov-header { margin-bottom:2.5rem; }
.ov-header h1 {
  font-size:clamp(1.6rem,2.8vw,2.2rem); font-weight:700;
  letter-spacing:-.02em; line-height:1.1; margin-bottom:.5rem;
}
.ov-header p { font-size:.9rem; color:var(--muted2); max-width:560px; line-height:1.65; }
.ov-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:1rem;
}
.ov-tile {
  background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:1.4rem; display:flex; flex-direction:column;
  transition:box-shadow .2s, transform .15s;
  position:relative; overflow:hidden;
  opacity:0; transform:translateY(12px); transition:opacity .45s, transform .45s, box-shadow .2s;
}
.ov-tile.vis { opacity:1; transform:none; }
.ov-tile:hover { box-shadow:0 4px 16px rgba(0,0,0,.08); transform:translateY(-2px); }
.ov-tile-bar { position:absolute; top:0; left:0; right:0; height:3px; }
.ov-tile-top { display:flex; align-items:flex-start; justify-content:space-between; gap:.5rem; margin-bottom:.6rem; }
.ov-tile-name { font-size:1rem; font-weight:700; letter-spacing:-.015em; line-height:1.2; }
.ov-tile-desc { font-size:.83rem; color:var(--muted2); line-height:1.65; margin-bottom:.9rem; }
.ov-tile-roi { list-style:none; padding:0; margin-bottom:1rem; flex:1; }
.ov-tile-roi li {
  font-size:.8rem; color:var(--muted2); line-height:1.55;
  margin-bottom:4px; padding-left:.9rem; position:relative;
}
.ov-tile-roi li::before { content:'→'; position:absolute; left:0; color:var(--red); font-size:.72rem; }
.ov-tile-link {
  display:inline-flex; align-items:center; gap:4px;
  font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--red); background:var(--red2); padding:4px 10px; border-radius:3px;
  border:none; cursor:pointer; margin-top:auto; align-self:flex-start;
  transition:background .15s;
}
.ov-tile-link:hover { background:rgba(237,25,58,.15); }

/* ── STATS STRIP ── */
.stats-strip {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:1px; background:var(--border); border-top:1px solid var(--border); border-bottom:1px solid var(--border);
}
.stat-cell {
  background:var(--bg2); padding:1.25rem 1.5rem;
}
.stat-cell:first-child { border-left:3px solid var(--red); }
.stat-num {
  font-family:var(--mono); font-size:1.7rem; font-weight:700; color:var(--text); line-height:1;
}
.stat-num .r { color:var(--red); }
.stat-key {
  font-size:10px; font-weight:500; letter-spacing:.08em; text-transform:uppercase;
  color:var(--muted); margin-top:4px;
}

/* ── ROI ── */
.roi-top {
  display:grid; grid-template-columns:1fr 1fr; gap:1px;
  background:var(--border); border:1px solid var(--border);
  border-radius:8px; overflow:hidden; margin-bottom:1.25rem;
}
.roi-top-cell {
  background:var(--card); padding:1.5rem;
}
.roi-top-cell.accent {
  background:linear-gradient(135deg, rgba(237,25,58,.06), rgba(237,25,58,.02));
  border-left:3px solid var(--red);
}
.roi-cell-label { font-family:var(--mono); font-size:10px; letter-spacing:.11em; text-transform:uppercase; color:var(--muted2); margin-bottom:.5rem; font-weight:600; }
.roi-cell-val { font-size:1.5rem; font-weight:700; color:var(--text); line-height:1.1; margin-bottom:.35rem; }
.roi-cell-val em { color:var(--red); font-style:normal; }
.roi-cell-note { font-size:.83rem; color:var(--muted2); line-height:1.6; }

.roi-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
  gap:.75rem; margin-bottom:1.25rem;
}
.roi-card {
  background:var(--card); border:1px solid var(--border); border-radius:7px;
  padding:1.25rem; position:relative; overflow:hidden;
  opacity:0; transform:translateY(12px); transition:opacity .45s, transform .45s;
}
.roi-card.vis { opacity:1; transform:none; }
.roi-bar { position:absolute; top:0; left:0; right:0; height:2px; }
.bar-g { background:var(--green); }
.bar-r { background:var(--red); }
.bar-b { background:var(--blue); }
.bar-a { background:var(--amber); }
.roi-label { font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted2); margin-bottom:.45rem; font-weight:600; }
.roi-val { font-size:1.55rem; font-weight:700; line-height:1; margin-bottom:.35rem; color:var(--text); }
.roi-val em { color:var(--red); font-style:normal; }
.roi-note { font-size:.82rem; color:var(--muted2); line-height:1.6; }

.proj-box {
  background:var(--card2); border:1px solid var(--border); border-radius:8px;
  padding:1.5rem 2rem;
}
.proj-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:1.5rem; margin-top:1.25rem;
}
.proj-item { border-left:2px solid var(--red); padding-left:.9rem; }
.proj-val { font-family:var(--mono); font-size:1.3rem; font-weight:700; color:var(--red); }
.proj-key { font-size:10px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--muted2); margin-top:2px; }
.proj-note { font-size:.79rem; color:var(--muted); margin-top:3px; }

/* ── WORKSTREAM TABS ── */
.ws-layout { display:grid; grid-template-columns:190px 1fr; gap:1.5rem; align-items:start; }
.ws-tabs { display:flex; flex-direction:column; gap:1px; position:sticky; top:1.5rem; }
.ws-tab {
  display:flex; align-items:center; gap:8px;
  padding:.48rem .75rem; border-radius:4px; cursor:pointer;
  font-size:12px; font-weight:500; color:var(--muted2);
  background:none; border:none; text-align:left; transition:all .15s;
  border-left:2px solid transparent;
}
.ws-tab:hover { background:var(--bg3); color:var(--text); }
.ws-tab.active { background:var(--card); color:var(--text); border-left-color:var(--red); font-weight:600; box-shadow:0 1px 3px rgba(0,0,0,.06); }
.ws-panel { display:none; }
.ws-panel.active { display:block; }

.ws-hdr {
  background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:1.5rem; margin-bottom:.75rem;
}
.ws-top { display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:.5rem; margin-bottom:.9rem; }
.ws-title { font-size:1.2rem; font-weight:700; letter-spacing:-.015em; }
.pill {
  font-family:var(--mono); font-size:8.5px; letter-spacing:.09em; text-transform:uppercase;
  padding:3px 10px; border-radius:3px;
}
.p-g { background:var(--green2); color:var(--green); border:1px solid rgba(21,128,61,.15); }
.p-r { background:var(--red2); color:#b91c1c; border:1px solid rgba(237,25,58,.15); }
.p-a { background:var(--amber2); color:var(--amber); border:1px solid rgba(146,64,14,.15); }
.p-b { background:var(--blue2); color:var(--blue); border:1px solid rgba(30,64,175,.15); }
.p-m { background:rgba(0,0,0,.05); color:var(--muted2); border:1px solid var(--border2); }
.ws-desc { font-size:.87rem; color:var(--muted2); line-height:1.7; margin-bottom:1rem; }
.ws-metrics {
  display:flex; gap:1.75rem; flex-wrap:wrap;
  padding-top:.9rem; border-top:1px solid var(--border);
}
.wm { display:flex; flex-direction:column; gap:2px; }
.wm-val { font-family:var(--mono); font-size:1.15rem; font-weight:700; color:var(--text); }
.wm-val.r { color:var(--red); }
.wm-key { font-size:9px; font-weight:600; letter-spacing:.09em; text-transform:uppercase; color:var(--muted); }

.ws-2col { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
.ws-block {
  background:var(--card2); border:1px solid var(--border); border-radius:6px; padding:1.1rem;
}
.ws-blabel {
  font-family:var(--mono); font-size:8.5px; letter-spacing:.11em; text-transform:uppercase;
  color:var(--muted); margin-bottom:.65rem;
}
.ws-block ul { list-style:none; padding:0; }
.ws-block li {
  font-size:.82rem; color:var(--muted2); line-height:1.6;
  margin-bottom:5px; padding-left:1rem; position:relative;
}
.ws-block li::before { content:'→'; position:absolute; left:0; color:var(--red); font-size:.75rem; }

.ws-mini-log {
  background:var(--card2); border:1px solid var(--border); border-radius:6px;
  padding:1rem; margin-top:.75rem;
}
.wml-row {
  display:flex; gap:.75rem; padding:.4rem 0;
  border-bottom:1px solid rgba(0,0,0,.04); align-items:flex-start;
}
.wml-row:last-child { border-bottom:none; }
.wml-date { font-family:var(--mono); font-size:9px; color:var(--muted); white-space:nowrap; padding-top:1px; min-width:52px; }
.wml-text { font-size:.8rem; color:var(--muted2); line-height:1.55; }

.ws-stack { background:var(--card2); border:1px solid var(--border); border-radius:6px; padding:1rem; margin-top:.75rem; }
.ws-stack code {
  font-family:var(--mono); font-size:10px; padding:2px 7px; border-radius:3px;
  margin:2px; display:inline-block;
}
.code-r { background:var(--red2); color:#b91c1c; }
.code-m { background:rgba(0,0,0,.05); color:var(--muted2); }

/* ── ARCHITECTURE ── */
.arch-wrap {
  background:var(--card); border:1px solid var(--border); border-radius:8px; padding:2rem;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
}
.arch-lbl {
  font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--muted2); margin-bottom:.9rem; font-weight:700;
}
.arch-row {
  display:flex; gap:1rem; flex-wrap:wrap; align-items:center; margin-bottom:1.25rem;
  background:var(--bg); border-radius:6px; padding:1rem;
}
.arch-node {
  flex:1; min-width:120px;
  background:#eceae6; border:1px solid var(--border2);
  border-radius:6px; padding:1rem 1.1rem; text-align:center;
}
.arch-node.red { background:rgba(237,25,58,0.12); border:1px solid rgba(237,25,58,0.3); }
.arch-arrow { color:var(--red); font-size:1.4rem; flex-shrink:0; font-weight:700; }
.arch-arrow.g { color:var(--green); }
.arch-icon { font-size:1.3rem; margin-bottom:6px; }
.arch-name { font-size:13px; font-weight:700; margin-bottom:4px; }
.arch-desc { font-family:var(--mono); font-size:11px; color:var(--muted2); line-height:1.5; }
.arch-divider { height:1px; background:var(--border); margin:1.5rem 0; }

/* ── NEXT PHASE ── */
.next-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(265px,1fr)); gap:.75rem; }
.next-card {
  background:var(--card); border:1px solid var(--border); border-radius:7px;
  padding:1.25rem; border-left:2px solid var(--red);
  opacity:0; transform:translateY(12px); transition:opacity .4s, transform .4s;
}
.next-card.vis { opacity:1; transform:none; }
.nc-num { font-family:var(--mono); font-size:9px; color:var(--red); margin-bottom:.35rem; letter-spacing:.09em; }
.nc-title { font-size:.95rem; font-weight:700; margin-bottom:.35rem; letter-spacing:-.01em; }
.nc-body { font-size:.82rem; color:var(--muted2); line-height:1.65; }
.nc-tag {
  display:inline-block; margin-top:.6rem;
  font-family:var(--mono); font-size:8.5px; letter-spacing:.09em; text-transform:uppercase;
  padding:2px 7px; border-radius:3px; background:var(--red2); color:var(--red);
}

/* ── ACTIVITY LOG ── */
.log-controls { display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:1.25rem; align-items:center; }
.log-filter {
  font-family:var(--mono); font-size:9.5px; letter-spacing:.09em; text-transform:uppercase;
  padding:4px 11px; border-radius:3px; cursor:pointer; border:1px solid var(--border2);
  background:transparent; color:var(--muted2); transition:all .15s;
}
.log-filter:hover, .log-filter.on { background:var(--red); color:#fff; border-color:var(--red); }
.log-search {
  font-family:var(--mono); font-size:11px; background:var(--card); border:1px solid var(--border2);
  color:var(--text); border-radius:3px; padding:4px 11px; outline:none; width:190px;
}
.log-search:focus { border-color:rgba(237,25,58,.35); }
.log-count { font-family:var(--mono); font-size:9px; color:var(--muted); margin-left:auto; }
.log-wrap { background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; overflow-x:auto; }
.log-table { width:100%; border-collapse:collapse; }
.log-table th {
  font-family:var(--mono); font-size:8.5px; letter-spacing:.11em; text-transform:uppercase;
  color:var(--muted); text-align:left; padding:.5rem .75rem; border-bottom:1px solid var(--border);
  background:var(--card2);
}
.log-table td {
  padding:.55rem .75rem; font-size:.81rem; color:var(--muted2);
  border-bottom:1px solid rgba(0,0,0,.04); vertical-align:top; line-height:1.5;
}
.log-table tr:hover td { background:rgba(237,25,58,.025); }
.log-ws { color:var(--text); font-weight:600; font-size:.79rem; white-space:nowrap; }
.log-date { font-family:var(--mono); font-size:9px; color:var(--muted); white-space:nowrap; }
.log-badge { font-family:var(--mono); font-size:8.5px; letter-spacing:.07em; padding:2px 7px; border-radius:3px; }
.lb-g { background:var(--green2); color:var(--green); }
.lb-r { background:var(--red2); color:#b91c1c; }
.lb-b { background:var(--blue2); color:var(--blue); }
.lb-m { background:rgba(0,0,0,.05); color:var(--muted2); }

/* ── CLOSING ── */
.closing {
  padding:4rem 3.5rem; background:var(--bg2);
  border-top:1px solid var(--border); text-align:center;
}
.closing-h { font-size:clamp(1.5rem,3vw,2.2rem); font-weight:700; letter-spacing:-.02em; line-height:1.1; margin-bottom:1rem; }
.closing-h em { color:var(--red); font-style:normal; }
.closing-body { font-size:.9rem; color:var(--muted2); line-height:1.75; max-width:500px; margin:0 auto 1.5rem; }
.closing-mono { font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--red); }

/* ── PRINT BUTTON ── */
.print-btn {
  position:fixed; bottom:1.25rem; left:calc(var(--sb) + 1.5rem); z-index:500;
  font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase;
  padding:7px 16px; border-radius:4px; cursor:pointer; border:1px solid var(--border2);
  background:var(--bg2); color:var(--muted2); transition:all .15s;
  display:flex; align-items:center; gap:6px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.print-btn:hover { background:var(--text); color:#fff; border-color:var(--text); }
.print-btn svg { width:12px; height:12px; flex-shrink:0; }

/* ── PRINT STYLES ── */
@media print {
  @page {
    size: letter;
    margin: 0.6in 0.7in;
  }
  @page :first { margin-top: 0.4in; }

  /* Reset */
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  html, body { background: #fff !important; font-size: 11pt; overflow: visible; }

  /* Hide interactive / nav chrome */
  .sidebar, .edit-bar, .print-btn, #prog,
  #log, #arch, .divider,
  .closing, #ws { display: none !important; }

  /* Main content fills page */
  .main { margin-left: 0 !important; }
  .sec, #overview, #roi, #next { padding: 0 !important; }

  /* ── PRINT HEADER (page 1 top) ── */
  .print-header {
    display: flex !important;
    align-items: center; justify-content: space-between;
    padding-bottom: 14pt; margin-bottom: 18pt;
    border-bottom: 2pt solid #ED193A;
  }
  .print-header-left { display: flex; align-items: center; gap: 10pt; }
  .print-header-dot {
    width: 28pt; height: 28pt; border-radius: 5pt; background: #ED193A !important;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace; font-size: 8pt; font-weight: 700; color: #fff;
  }
  .print-header-name { font-size: 11pt; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  .print-header-sub { font-family: 'Space Mono', monospace; font-size: 7.5pt; color: #999; margin-top: 2pt; }
  .print-header-right { text-align: right; }
  .print-header-date { font-family: 'Space Mono', monospace; font-size: 9pt; font-weight: 700; color: #181715; }

/* ── SESSION & AUTH ── */
let sessionToken = sessionStorage.getItem('cf_token');
let userRole = sessionStorage.getItem('cf_role');

/* ── VIEW AUTH GATE ── */
async function checkAuth() {
  if (sessionToken) {
    // Verify token is still valid
    try {
      const res = await fetch('/api/verify', {
        headers: { 'x-session-token': sessionToken }
      });
      if (res.ok) {
        const { role } = await res.json();
        userRole = role;
        showApp();
        return;
      }
    } catch(e) {}
    // Token invalid — clear and show gate
    sessionStorage.removeItem('cf_token');
    sessionStorage.removeItem('cf_role');
    sessionToken = null;
    userRole = null;
  }
  showAuthGate();
}

function showAuthGate() {
  document.getElementById('authGate').style.display = 'flex';
  document.body.style.visibility = 'visible';
  setTimeout(() => document.getElementById('authPwInput').focus(), 100);
}

function showApp() {
  document.getElementById('authGate').style.display = 'none';
  document.body.style.visibility = 'visible';
  // Show edit button only for editors
  if (userRole === 'editor') {
    document.getElementById('editBar').style.display = 'flex';
  }
  loadSavedContent();
}

async function submitAuthPassword() {
  const pw = document.getElementById('authPwInput').value;
  const btn = document.getElementById('authBtn');
  const err = document.getElementById('authError');
  if (!pw) return;

  btn.textContent = 'Checking…';
  btn.disabled = true;
  err.style.display = 'none';

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });

    if (res.status === 401) {
      err.style.display = 'block';
      btn.textContent = 'Enter';
      btn.disabled = false;
      document.getElementById('authPwInput').value = '';
      document.getElementById('authPwInput').focus();
      return;
    }

    const { token, role } = await res.json();
    sessionToken = token;
    userRole = role;
    sessionStorage.setItem('cf_token', token);
    sessionStorage.setItem('cf_role', role);
    showApp();
  } catch(e) {
    err.textContent = 'Connection error. Please try again.';
    err.style.display = 'block';
    btn.textContent = 'Enter';
    btn.disabled = false;
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('authGate').style.display === 'flex') {
    submitAuthPassword();
  }
});

checkAuth();

/* ── EDIT MODE ── */
const EDITABLE_SELECTORS = [
  '.roi-label', '.roi-val', '.roi-note',
  '.roi-cell-val', '.roi-cell-note',
  '.stat-num', '.stat-key',
  '.proj-val', '.proj-key', '.proj-note',
  '.nc-title', '.nc-body', '.nc-tag',
  '.ws-title', '.ws-desc', '.wm-val', '.wm-key',
  '.ws-block li', '.wml-text', '.wml-date',
  '.ov-tile-name', '.ov-tile-desc', '.ov-tile-roi li',
  '.arch-name', '.arch-desc',
  '.closing-h', '.closing-body',
  '.section-lead',
];

let editMode = false;

/* ── EDIT PASSWORD MODAL ── */
function showEditPasswordModal() {
  document.getElementById('pwModal').style.display = 'flex';
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').style.display = 'none';
  setTimeout(() => document.getElementById('pwInput').focus(), 50);
}

function closePasswordModal() {
  document.getElementById('pwModal').style.display = 'none';
}

async function submitEditPassword() {
  const pw = document.getElementById('pwInput').value;
  const err = document.getElementById('pwError');
  if (!pw) return;

  // Re-authenticate as editor
  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (res.status === 401) {
      err.style.display = 'block';
      return;
    }
    const { token, role } = await res.json();
    if (role !== 'editor') {
      err.textContent = 'View-only password cannot edit.';
      err.style.display = 'block';
      return;
    }
    sessionToken = token;
    userRole = role;
    sessionStorage.setItem('cf_token', token);
    sessionStorage.setItem('cf_role', role);
    closePasswordModal();
    enterEditMode();
  } catch(e) {
    err.textContent = 'Connection error.';
    err.style.display = 'block';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePasswordModal();
  if (e.key === 'Enter' && document.getElementById('pwModal').style.display === 'flex') submitEditPassword();
});

/* ── ENTER / EXIT EDIT MODE ── */
function enterEditMode() {
  editMode = true;
  document.body.classList.add('edit-mode');
  const btn = document.getElementById('editBtn');
  const hint = document.getElementById('editHint');
  btn.textContent = '✓ Done Editing';
  btn.classList.add('on');
  hint.classList.add('show');
  EDITABLE_SELECTORS.forEach(sel => {
    document.querySelectorAll(sel).forEach(el => { el.contentEditable = 'true'; });
  });
}

async function toggleEditMode() {
  if (!editMode) {
    showEditPasswordModal();
    return;
  }
  const btn = document.getElementById('editBtn');
  btn.textContent = '⏳ Saving…';
  btn.disabled = true;

  const content = {};
  EDITABLE_SELECTORS.forEach(sel => {
    document.querySelectorAll(sel).forEach((el, i) => {
      content[sel + ':' + i] = el.innerHTML;
    });
  });

  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-session-token': sessionToken
      },
      body: JSON.stringify({ content }),
    });
    if (res.status === 401) {
      alert('Session expired. Please refresh and log in again.');
      btn.textContent = '✓ Done Editing';
      btn.disabled = false;
      return;
    }
    if (!res.ok) throw new Error('Save failed');
  } catch (err) {
    alert('Save failed. Please check your connection and try again.');
    btn.textContent = '✓ Done Editing';
    btn.disabled = false;
    return;
  }

  editMode = false;
  document.body.classList.remove('edit-mode');
  btn.textContent = '✏ Edit Content';
  btn.classList.remove('on');
  btn.disabled = false;
  document.getElementById('editHint').classList.remove('show');
  EDITABLE_SELECTORS.forEach(sel => {
    document.querySelectorAll(sel).forEach(el => { el.contentEditable = 'false'; });
  });
}

/* ── LOAD SAVED CONTENT ── */
async function loadSavedContent() {
  try {
    const res = await fetch('/api/load', {
      headers: { 'x-session-token': sessionToken }
    });
    if (!res.ok) return;
    const { content } = await res.json();
    if (content) {
      EDITABLE_SELECTORS.forEach(sel => {
        document.querySelectorAll(sel).forEach((el, i) => {
          const key = sel + ':' + i;
          if (content[key] !== undefined) el.innerHTML = content[key];
        });
      });
    }
  } catch (err) {
    console.warn('Could not load saved content:', err);
  }
}

// Prevent Enter key from inserting <div> blocks in contentEditable
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.contentEditable === 'true') {
    e.preventDefault();
    document.execCommand('insertLineBreak');
  }
});
